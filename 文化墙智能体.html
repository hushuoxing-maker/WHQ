<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文化墙专业提示词生成器 · 20组方案 · 优化布局</title>
    <style>
        :root {
            --bg: #f0ede8;
            --card-bg: #fefefc;
            --header-bg: #1c2533;
            --accent: #b8956a;
            --text: #1e2a36;
            --text2: #4a5462;
            --border: #dde1e6;
            --btn-bg: #1e2a36;
            --btn-hover: #111922;
            --tag-bg: #f1f4f7;
            --tag-active: #1e2a36;
            --tag-active-text: #fff;
            --mat-active: #b8956a;
            --mat-active-text: #fff;
            --model-active: #4a7c9b;
            --model-active-text: #fff;
            --form-active: #7a9a6e;
            --form-active-text: #fff;
            --shadow: 0 20px 44px rgba(0,0,0,0.08);
            --radius: 20px;
            --transition: 0.18s ease;
        }
        *{margin:0;padding:0;box-sizing:border-box;}
        body{
            background: linear-gradient(170deg, #e8e4de 0%, #ddd9d1 20%, #e3e0d9 50%, #e9e8e3 100%);
            font-family: 'PingFang SC','Microsoft YaHei','Helvetica Neue',sans-serif;
            display:flex; justify-content:center; align-items:flex-start; min-height:100vh; padding:20px 14px 50px;
            -webkit-font-smoothing:antialiased;
        }
        .generator-card{
            max-width:1440px; width:100%; background:var(--card-bg); border-radius:var(--radius);
            box-shadow:var(--shadow); overflow:hidden; border:1px solid #d9dcdd;
        }
        .header{
            background:var(--header-bg); padding:20px 28px 18px; color:#fff;
            border-bottom:3px solid var(--accent); display:flex; flex-wrap:wrap; align-items:center;
            justify-content:space-between; gap:10px;
        }
        .header h1{font-size:26px; font-weight:500; letter-spacing:0.8px; color:#f2f4f6;}
        .header .subtitle{font-size:13px; color:#bcc5cf; border-left:3px solid var(--accent); padding-left:14px;}
        .header-badge{
            background:rgba(255,255,255,0.06); color:#cdd6e0; padding:5px 14px; border-radius:20px;
            font-size:12px; border:1px solid rgba(255,255,255,0.1); white-space:nowrap;
        }
        .main{display:flex; flex-wrap:wrap;}

        /* 输入面板 - 比例缩小一点，文字区置顶 */
        .input-panel{
            flex:1 1 400px; min-width:340px; background:#fcfbf8; padding:20px 18px 18px;
            border-right:1px solid #eaedf0; display:flex; flex-direction:column; gap:14px;
            max-height:950px; overflow-y:auto;
        }
        .section-title{
            font-size:13.5px; font-weight:600; color:#4a5462; letter-spacing:0.4px;
            display:flex; align-items:center; gap:5px; margin-bottom:4px;
        }
        .section-title .icon-dot{width:6px; height:6px; border-radius:50%; background:var(--accent);}
        .btn-group-grid{
            display:grid; grid-template-columns:repeat(2,1fr); gap:6px;
        }
        .btn-group-grid.col3{grid-template-columns:repeat(3,1fr);}
        .btn-group-grid.col4{grid-template-columns:repeat(4,1fr);}
        .btn-group-grid.col5{grid-template-columns:repeat(5,1fr);}
        .tag-btn{
            display:inline-flex; align-items:center; justify-content:center; text-align:center;
            padding:8px 5px; font-size:12px; font-weight:500; letter-spacing:0.2px;
            background:var(--tag-bg); color:#3a4552; border:1.5px solid #e0e4e9; border-radius:7px;
            cursor:pointer; transition:var(--transition); user-select:none; white-space:nowrap;
            font-family:inherit; line-height:1.3;
        }
        .tag-btn:hover{background:#e5eaf0; border-color:#c5cdd6; transform:translateY(-1px);}
        .tag-btn.active{
            background:var(--tag-active); color:var(--tag-active-text); border-color:var(--tag-active);
            font-weight:600; box-shadow:0 3px 10px rgba(30,42,54,0.2);
        }
        .tag-btn.mat-active{
            background:var(--mat-active); color:var(--mat-active-text); border-color:#a07d52;
            font-weight:600; box-shadow:0 3px 10px rgba(184,149,106,0.25);
        }
        .tag-btn.model-active{
            background:var(--model-active); color:var(--model-active-text); border-color:#3a6a8a;
            font-weight:600; box-shadow:0 3px 10px rgba(74,124,155,0.25);
        }
        .tag-btn.form-active{
            background:var(--form-active); color:var(--form-active-text); border-color:#5d7d54;
            font-weight:600; box-shadow:0 3px 10px rgba(122,154,110,0.3);
        }
        .input-row{display:flex; flex-wrap:wrap; gap:8px;}
        .input-row .input-group{flex:1; min-width:100px;}
        .input-group label{display:block; font-size:12px; font-weight:500; color:#4a5462; margin-bottom:2px;}
        .input-group input{
            width:100%; padding:10px 12px; font-size:13px; background:#f9fafb; border:1px solid #d5dbe2;
            border-radius:6px; font-family:inherit; color:#1e2a36; transition:var(--transition);
        }
        .input-group input:focus{border-color:var(--accent); outline:none; box-shadow:0 0 0 3px rgba(184,149,106,0.08); background:#fff;}
        .generate-btn{
            background:var(--btn-bg); border:none; width:100%; padding:13px; font-size:15px; font-weight:500;
            color:#fff; letter-spacing:1px; border-radius:26px; cursor:pointer; transition:var(--transition);
            border-bottom:3px solid var(--accent); margin-top:6px; font-family:inherit;
        }
        .generate-btn:hover{background:var(--btn-hover); transform:translateY(-2px); box-shadow:0 10px 24px rgba(0,0,0,0.15);}

        /* 输出面板 - 比例加大，图框舒适 */
        .output-panel{
            flex:2.3 1 680px; background:#fafaf7; padding:20px 22px 16px; max-height:950px;
            overflow-y:auto; display:flex; flex-direction:column; gap:10px;
        }
        .output-header{display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px;}
        .output-header h2{font-size:20px; font-weight:500; color:#1e2a36;}
        .badge{
            background:#e8ecf1; color:#3a4552; padding:4px 12px; border-radius:16px; font-size:12px;
            font-weight:500; white-space:nowrap;
        }
        .badge.accent{background:#f3ede5; color:#8b6d4a;}
        .badge.model-badge{background:#e4edf3; color:#3a5d7a;}
        .badge.count-badge{background:#e8f0e8; color:#4a7a4e; font-weight:600;}
        .badge.form-badge{background:#eaf5e5; color:#4a6e3f;}
        .prompts-grid{display:flex; flex-direction:column; gap:12px;}
        .prompt-item{
            background:#fff; border:1px solid #eaedf0; border-radius:12px; padding:18px 22px 16px;
            transition:var(--transition); position:relative; display:flex; flex-direction:column; gap:8px;
        }
        .prompt-item:hover{border-color:#c5cdd6; box-shadow:0 4px 14px rgba(0,0,0,0.04);}
        .prompt-top-row{display:flex; align-items:center; gap:7px; flex-wrap:wrap;}
        .prompt-num{
            font-size:11px; font-weight:600; color:#6b7682; background:#f1f4f7;
            padding:3px 9px; border-radius:10px; white-space:nowrap;
        }
        .prompt-tag{
            font-size:10.5px; font-weight:500; padding:2px 7px; border-radius:10px; white-space:nowrap;
        }
        .tag-material{background:#fdf3e8; color:#8b6d4a;}
        .tag-color{background:#e8f0f7; color:#4a6d8c;}
        .tag-theme{background:#eef5ed; color:#4a7a4e;}
        .tag-layout{background:#f5f0fa; color:#6b4d8a;}
        .tag-form{background:#dff0d8; color:#3c6e2f;}
        .prompt-text{
            font-size:14px; line-height:1.75; color:#2d3844; padding-right:75px;
            word-break:break-word; background:#f9fafb; padding:12px 16px; border-radius:8px;
            white-space:pre-wrap; letter-spacing:0.2px;
        }
        .copy-btn{
            background:#f6f8fa; color:#3a4552; border:1px solid #dde1e6; border-radius:20px;
            padding:6px 14px; font-size:12px; font-weight:500; cursor:pointer; transition:var(--transition);
            display:inline-flex; align-items:center; gap:4px; position:absolute; bottom:14px; right:18px;
            font-family:inherit; z-index:1;
        }
        .copy-btn:hover{background:#b8956a; color:#fff; border-color:#a07d52;}
        .copy-btn.copied{background:#4caf50; color:#fff; border-color:#388e3c; pointer-events:none;}
        .footer-note{
            font-size:11px; color:#8b95a2; text-align:right; border-top:1px dashed #dde1e6;
            padding-top:10px; flex-shrink:0;
        }
        .empty-state{text-align:center; padding:40px 20px; color:#9aa5b0; font-size:14px;}

        @media(max-width:950px){
            .input-panel{border-right:none; border-bottom:1px solid #eaedf0; flex:1 1 100%; max-height:none;}
            .output-panel{flex:1 1 100%; max-height:650px;}
            .btn-group-grid.col5{grid-template-columns:repeat(3,1fr);}
            .btn-group-grid.col4{grid-template-columns:repeat(2,1fr);}
            .prompt-text{padding-right:60px; font-size:13px;}
        }
        @media(max-width:500px){
            .btn-group-grid,.btn-group-grid.col3,.btn-group-grid.col4,.btn-group-grid.col5{grid-template-columns:repeat(2,1fr);}
            .prompt-text{padding-right:0; padding-bottom:40px;}
            .prompt-item{padding:14px 14px 48px;}
            .header h1{font-size:20px;}
        }
    </style>
</head>
<body>
<div class="generator-card">
    <div class="header">
        <div>
            <h1>文化墙专业提示词生成器 · 20组方案</h1>
            <span class="subtitle">材质·主题·色彩·表现形式 · 全中文 · 每组不重复</span>
        </div>
        <span class="header-badge">🏗️ 即梦AI / MidJourney / Image2 / 香蕉模型</span>
    </div>

    <div class="main">
        <!-- 输入面板：文字内容置顶 -->
        <div class="input-panel" id="inputPanel">
            <!-- 文字内容区（移到最上面） -->
            <div>
                <div class="section-title"><span class="icon-dot"></span>文字内容</div>
                <div class="input-row">
                    <div class="input-group"><label>主标题 / 使命</label><input type="text" id="mission" value="不忘初心·牢记使命"></div>
                    <div class="input-group"><label>副标题 / 愿景</label><input type="text" id="vision" value="建设一流团队·服务高质量发展"></div>
                </div>
                <div class="input-row" style="margin-top:6px;">
                    <div class="input-group"><label>补充内容 / 价值观</label><input type="text" id="values" value="忠诚·担当·创新·奉献"></div>
                    <div class="input-group"><label>空间位置</label><input type="text" id="spaceType" value="单位大厅主墙面"></div>
                </div>
            </div>

            <!-- 行业类型 -->
            <div>
                <div class="section-title"><span class="icon-dot"></span>行业类型（必选）</div>
                <div class="btn-group-grid col5" id="industryBtns">
                    <button class="tag-btn active" data-industry="党建文化墙">党建文化墙</button>
                    <button class="tag-btn" data-industry="机关单位文化墙">机关单位文化墙</button>
                    <button class="tag-btn" data-industry="企业介绍文化墙">企业介绍文化墙</button>
                    <button class="tag-btn" data-industry="品牌故事文化墙">品牌故事文化墙</button>
                    <button class="tag-btn" data-industry="发展历程文化墙">发展历程文化墙</button>
                    <button class="tag-btn" data-industry="团队风采文化墙">团队风采文化墙</button>
                    <button class="tag-btn" data-industry="合作伙伴文化墙">合作伙伴文化墙</button>
                    <button class="tag-btn" data-industry="互动版板块文化墙">互动版板块文化墙</button>
                    <button class="tag-btn" data-industry="商业空间文化墙">商业空间文化墙</button>
                    <button class="tag-btn" data-industry="校园文化墙">校园文化墙</button>
                </div>
            </div>

            <!-- 主材质 -->
            <div>
                <div class="section-title"><span class="icon-dot"></span>主材质（单选）</div>
                <div class="btn-group-grid col4" id="materialBtns">
                    <button class="tag-btn mat-active" data-material="烤漆板">烤漆板</button>
                    <button class="tag-btn" data-material="木饰面">木饰面</button>
                    <button class="tag-btn" data-material="微水泥">微水泥</button>
                    <button class="tag-btn" data-material="金属板">金属板</button>
                    <button class="tag-btn" data-material="亚克力">亚克力</button>
                    <button class="tag-btn" data-material="石材纹理">石材纹理</button>
                    <button class="tag-btn" data-material="艺术涂料">艺术涂料</button>
                    <button class="tag-btn" data-material="波浪板">波浪板</button>
                    <button class="tag-btn" data-material="皮革硬包">皮革硬包</button>
                    <button class="tag-btn" data-material="磨砂玻璃">磨砂玻璃</button>
                    <button class="tag-btn" data-material="木格栅">木格栅</button>
                    <button class="tag-btn" data-material="铝塑板">铝塑板</button>
                </div>
            </div>

            <!-- 风格倾向 -->
            <div>
                <div class="section-title"><span class="icon-dot"></span>风格倾向</div>
                <div class="btn-group-grid col3" id="styleBtns">
                    <button class="tag-btn active" data-style="现代简约">现代简约</button>
                    <button class="tag-btn" data-style="商务大气">商务大气</button>
                    <button class="tag-btn" data-style="轻奢高级">轻奢高级</button>
                    <button class="tag-btn" data-style="新中式">新中式</button>
                    <button class="tag-btn" data-style="科技感">科技感</button>
                    <button class="tag-btn" data-style="庄重红色">庄重红色</button>
                </div>
            </div>

            <!-- 表现形式 -->
            <div>
                <div class="section-title"><span class="icon-dot"></span>表现形式（单选）</div>
                <div class="btn-group-grid col4" id="formStyleBtns">
                    <button class="tag-btn form-active" data-form="立体造型">立体造型</button>
                    <button class="tag-btn" data-form="平面印刷">平面印刷</button>
                    <button class="tag-btn" data-form="自然森系风格">自然森系风格</button>
                    <button class="tag-btn" data-form="可更新材质文化墙">可更新材质文化墙</button>
                    <button class="tag-btn" data-form="实物展示风格">实物展示风格</button>
                    <button class="tag-btn" data-form="生态自然风">生态自然风</button>
                    <button class="tag-btn" data-form="新中式">新中式</button>
                    <button class="tag-btn" data-form="科技感">科技感</button>
                    <button class="tag-btn" data-form="体育竞技风格文化墙">体育竞技风格</button>
                    <button class="tag-btn" data-form="卡通风格">卡通风格</button>
                    <button class="tag-btn" data-form="现代简约">现代简约</button>
                    <button class="tag-btn" data-form="校园风格">校园风格</button>
                    <button class="tag-btn" data-form="廉政党建">廉政党建</button>
                    <button class="tag-btn" data-form="乡村文化墙">乡村文化墙</button>
                    <button class="tag-btn" data-form="社区文化墙">社区文化墙</button>
                    <button class="tag-btn" data-form="医院文化墙">医院文化墙</button>
                </div>
            </div>

            <!-- 生图模型 -->
            <div>
                <div class="section-title"><span class="icon-dot"></span>生图模型（全中文输出）</div>
                <div class="btn-group-grid col4" id="modelBtns">
                    <button class="tag-btn model-active" data-model="jimeng">即梦AI</button>
                    <button class="tag-btn" data-model="midjourney">MidJourney</button>
                    <button class="tag-btn" data-model="image2">Image2</button>
                    <button class="tag-btn" data-model="banana">香蕉模型</button>
                </div>
            </div>

            <button class="generate-btn" id="generateBtn">⚡ 生成 20 组专业提示词（不重复）</button>
        </div>

        <!-- 输出面板 -->
        <div class="output-panel" id="outputPanel">
            <div class="output-header">
                <h2>📐 20组正立面专业提示词</h2>
                <span class="badge accent" id="industryBadge">党建文化墙</span>
                <span class="badge form-badge" id="formBadge">立体造型</span>
                <span class="badge model-badge" id="modelBadge">即梦AI</span>
                <span class="badge count-badge" id="countDisplay">0 / 20</span>
            </div>
            <div class="prompts-grid" id="promptsList">
                <div class="empty-state">点击生成按钮，显示20组专业方案</div>
            </div>
            <div class="footer-note">⚡ 20组完全不同 · 全中文 · 正立面完全展示</div>
        </div>
    </div>
</div>

<script>
(function() {
    // 元素引用
    const industryBtnsContainer = document.getElementById('industryBtns');
    const materialBtnsContainer = document.getElementById('materialBtns');
    const styleBtnsContainer = document.getElementById('styleBtns');
    const formStyleBtnsContainer = document.getElementById('formStyleBtns');
    const modelBtnsContainer = document.getElementById('modelBtns');
    const generateBtn = document.getElementById('generateBtn');
    const promptsListDiv = document.getElementById('promptsList');
    const countDisplay = document.getElementById('countDisplay');
    const industryBadge = document.getElementById('industryBadge');
    const formBadge = document.getElementById('formBadge');
    const modelBadge = document.getElementById('modelBadge');
    const outputPanel = document.getElementById('outputPanel');
    const missionInput = document.getElementById('mission');
    const visionInput = document.getElementById('vision');
    const valuesInput = document.getElementById('values');
    const spaceTypeInput = document.getElementById('spaceType');

    let selectedIndustry = '党建文化墙';
    let selectedMaterial = '烤漆板';
    let selectedStyle = '现代简约';
    let selectedFormStyle = '立体造型';
    let selectedModel = 'jimeng';

    function setupButtonGroup(container, activeClass, onSelect) {
        container.addEventListener('click', function(e) {
            const btn = e.target.closest('button');
            if (!btn) return;
            container.querySelectorAll('button').forEach(b => b.classList.remove('active','mat-active','model-active','form-active'));
            btn.classList.add(activeClass);
            onSelect(btn);
        });
    }

    setupButtonGroup(industryBtnsContainer, 'active', function(btn){
        selectedIndustry = btn.getAttribute('data-industry');
        industryBadge.textContent = selectedIndustry;
        if(selectedIndustry === '党建文化墙' || selectedIndustry === '机关单位文化墙'){
            styleBtnsContainer.querySelectorAll('button').forEach(b => b.classList.remove('active'));
            const redBtn = styleBtnsContainer.querySelector('[data-style="庄重红色"]');
            if(redBtn){ redBtn.classList.add('active'); selectedStyle = '庄重红色'; }
        }
    });
    setupButtonGroup(materialBtnsContainer, 'mat-active', btn => selectedMaterial = btn.getAttribute('data-material'));
    setupButtonGroup(styleBtnsContainer, 'active', btn => selectedStyle = btn.getAttribute('data-style'));
    setupButtonGroup(formStyleBtnsContainer, 'form-active', btn => {
        selectedFormStyle = btn.getAttribute('data-form');
        formBadge.textContent = selectedFormStyle;
    });
    setupButtonGroup(modelBtnsContainer, 'model-active', btn => {
        selectedModel = btn.getAttribute('data-model');
        const names = {jimeng:'即梦AI', midjourney:'MidJourney', image2:'Image2', banana:'香蕉模型'};
        modelBadge.textContent = names[selectedModel] || selectedModel;
    });

    function getIndustryColors(industry){
        const map = {
            '党建文化墙':['中国红','鎏金','米白','深红','暖黄','朱砂红','象牙白','暗金','赤红','浅驼'],
            '机关单位文化墙':['深红','金色','米色','深蓝','纯白','藏蓝','银灰','浅金','墨绿','暖白'],
            '企业介绍文化墙':['科技蓝','纯白','深灰','浅蓝','银灰','宝蓝','碳黑','冰白','钴蓝','雾灰'],
            '品牌故事文化墙':['暖棕','米白','深咖','古铜','浅灰','焦糖','奶白','巧克力','亚麻','陶土'],
            '发展历程文化墙':['深灰','金色','纯白','浅灰','深蓝','铁灰','香槟金','珍珠白','石墨','烟蓝'],
            '团队风采文化墙':['活力橙','纯白','浅灰','深蓝','暖黄','珊瑚','天蓝','柠檬黄','草绿','奶白'],
            '合作伙伴文化墙':['商务蓝','纯白','银灰','深灰','金色','海军蓝','铂金','雾蓝','炭灰','亮白'],
            '互动版板块文化墙':['清新绿','纯白','浅灰','橙色','深灰','薄荷绿','鹅黄','天青','雅灰','嫩绿'],
            '商业空间文化墙':['时尚黑','金色','纯白','深灰','暖黄','曜石黑','玫瑰金','奶油白','烟灰','琥珀'],
            '校园文化墙':['明亮蓝','纯白','绿色','黄色','浅灰','天蓝','嫩绿','阳光黄','橙红','粉蓝']
        };
        return map[industry] || map['企业介绍文化墙'];
    }
    function getIndustryThemeKeywords(industry){
        const map = {

    function generatePrompts(){
        const spaceType = spaceTypeInput.value.trim() || '单位大厅主墙面';
        const mission = missionInput.value.trim() || '不忘初心·牢记使命';
        const vision = visionInput.value.trim() || '建设一流团队·服务高质量发展';
        const values = valuesInput.value.trim() || '忠诚·担当·创新·奉献';
        const colors = getIndustryColors(selectedIndustry);
        const themes = getIndustryThemeKeywords(selectedIndustry);
        const variants = getDesignVariants();
        const formDesc = getFormStyleDescription(selectedFormStyle);
        const prompts = [];
        for(let i=0;i<20;i++){
            const dv = variants[i];
            const mainColor = colors[dv.colorShift % colors.length];
            const secColor = colors[(dv.colorShift+3) % colors.length];
            const accentColor = colors[(dv.colorShift+6) % colors.length];
            const themeKW = themes[dv.themeShift % themes.length];
            const themeKW2 = themes[(dv.themeShift+4) % themes.length];
            const themeKW3 = themes[(dv.themeShift+7) % themes.length];
            let prefix = '';
            if(selectedModel==='midjourney') prefix='建筑室内效果图：';
            else if(selectedModel==='image2') prefix='高清室内设计渲染图：';
            else if(selectedModel==='banana') prefix='8K超清文化墙效果图：';
            const prompt = `${prefix}${selectedIndustry}文化墙设计方案，安装于${spaceType}，采用${dv.layout}。主体材质选用${selectedMaterial}，${dv.materialDesc}，主色调为${mainColor}，辅以${secColor}点缀，细节处运用${accentColor}提亮。设计主题融合"${themeKW}"、"${themeKW2}"与"${themeKW3}"三大概念。主标题"${mission}"以醒目大字${dv.focus}，副标题"${vision}"以适中字号配合排列于对应区域，补充内容"${values}"错落分布点缀其间。表现形式：${formDesc}。灯光方案为${dv.lighting}。整体风格定位${selectedStyle}，文字排版舒适层次分明，所有工艺均可施工落地，文化墙正立面完全展示，平视视角。`;
            prompts.push({prompt, material:selectedMaterial, color:mainColor, theme:themeKW, layout:dv.layout.replace('布局',''), form:selectedFormStyle});
        }
        return prompts;
    }

    function renderPrompts(promptObjs){
        if(!promptObjs || promptObjs.length===0){
            promptsListDiv.innerHTML = '<div class="empty-state">⚠️ 生成失败</div>';
            countDisplay.innerText = '0 / 20';
            return;
        }
        let html = '';
        promptObjs.forEach((item,idx)=>{
            const escaped = item.prompt.replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
            html += `<div class="prompt-item">
                <div class="prompt-top-row">
                    <span class="prompt-num">第${idx+1}组</span>
                    <span class="prompt-tag tag-material">🪵${item.material}</span>
                    <span class="prompt-tag tag-color">🎨${item.color}</span>
                    <span class="prompt-tag tag-theme">📌${item.theme}</span>
                    <span class="prompt-tag tag-layout">📐${item.layout}</span>
                    <span class="prompt-tag tag-form">✨${item.form}</span>
                </div>
                <div class="prompt-text">${item.prompt}</div>
                <button class="copy-btn" data-prompt="${escaped}">📋 复制</button>
            </div>`;
        });
        promptsListDiv.innerHTML = html;
        countDisplay.innerText = `${promptObjs.length} / 20`;
        industryBadge.textContent = selectedIndustry;
        formBadge.textContent = selectedFormStyle;
        setupCopyButtons();
        outputPanel.scrollTo({top:0, behavior:'smooth'});
    }

    function setupCopyButtons(){
        document.querySelectorAll('.copy-btn').forEach(btn => {
            const clone = btn.cloneNode(true);
            btn.parentNode.replaceChild(clone, btn);
            clone.addEventListener('click', function(e){
                e.preventDefault();
                const txt = this.getAttribute('data-prompt');
                navigator.clipboard.writeText(txt).then(()=>{
                    const orig = this.innerHTML;
                    this.innerHTML = '✓ 已复制';
                    this.classList.add('copied');
                    setTimeout(()=>{ this.innerHTML = orig; this.classList.remove('copied'); },1800);
                }).catch(()=>{
                    const ta = document.createElement('textarea');
                    ta.value = txt; ta.style.cssText='position:fixed;opacity:0;';
                    document.body.appendChild(ta); ta.select();
                    try{document.execCommand('copy');}catch(er){}
                    document.body.removeChild(ta);
                    const orig = this.innerHTML;
                    this.innerHTML = '✓ 已复制';
                    this.classList.add('copied');
                    setTimeout(()=>{ this.innerHTML = orig; this.classList.remove('copied'); },1800);
                });
            });
        });
    }

    function handleGenerate(){
        promptsListDiv.innerHTML = '<div class="empty-state">⏳ 正在生成20组不重复提示词...</div>';
        countDisplay.innerText = '0 / 20';
        setTimeout(()=>{
            try{
                const prompts = generatePrompts();
                renderPrompts(prompts);
            }catch(e){
                promptsListDiv.innerHTML = '<div class="empty-state">❌ 生成出错</div>';
                console.error(e);
            }
        },80);
    }

    generateBtn.addEventListener('click', handleGenerate);
    window.addEventListener('DOMContentLoaded', ()=> setTimeout(handleGenerate, 200));
    document.querySelectorAll('.input-group input').forEach(inp => {
        inp.addEventListener('keydown', function(e){
            if(e.ctrlKey && e.key==='Enter'){ e.preventDefault(); handleGenerate(); }
        });
    });
})();
