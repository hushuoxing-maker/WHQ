<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文化墙专业提示词生成器 · 20组方案 · 表现形式选择</title>
    <style>
        :root {
            --bg: #f0ede8;
            --card-bg: #fefefc;
            --header-bg: #1c2533;
            --accent: #b8956a;
            --accent2: #8b9db5;
            --text: #1e2a36;
            --text2: #4a5462;
            --text3: #6b7682;
            --border: #dde1e6;
            --btn-bg: #1e2a36;
            --btn-hover: #111922;
            --tag-bg: #f1f4f7;
            --tag-active: #1e2a36;
            --tag-active-text: #fff;
            --mat-active: #b8956a;
            --mat-active-text: #fff;
            --model-active: #4a7c9b;
            --model-active-text: #fff;
            --form-active: #7a9a6e;
            --form-active-text: #fff;
            --shadow: 0 20px 44px rgba(0, 0, 0, 0.10);
            --radius: 22px;
            --radius-sm: 10px;
            --transition: 0.18s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(170deg, #e8e4de 0%, #ddd9d1 20%, #e3e0d9 50%, #e9e8e3 100%);
            font-family: 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 24px 14px 50px;
            -webkit-font-smoothing: antialiased;
        }
        .generator-card {
            max-width: 1420px;
            width: 100%;
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
            border: 1px solid #d9dcdd;
        }
        .header {
            background: var(--header-bg);
            padding: 22px 30px 20px;
            color: #fff;
            border-bottom: 3px solid var(--accent);
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }
        .header h1 {
            font-size: 26px;
            font-weight: 500;
            letter-spacing: 0.8px;
            color: #f2f4f6;
        }
        .header .subtitle {
            font-size: 13.5px;
            color: #bcc5cf;
            letter-spacing: 0.3px;
            border-left: 3px solid var(--accent);
            padding-left: 14px;
        }
        .header-badge {
            background: rgba(255, 255, 255, 0.06);
            color: #cdd6e0;
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 12.5px;
            letter-spacing: 0.4px;
            border: 1px solid rgba(255, 255, 255, 0.10);
            white-space: nowrap;
            flex-shrink: 0;
        }
        .main {
            display: flex;
            flex-wrap: wrap;
        }
        .input-panel {
            flex: 1 1 460px;
            min-width: 360px;
            background: #fcfbf8;
            padding: 24px 22px 20px;
            border-right: 1px solid #eaedf0;
            display: flex;
            flex-direction: column;
            gap: 16px;
            max-height: 900px;
            overflow-y: auto;
        }
        .input-panel::-webkit-scrollbar {
            width: 4px;
        }
        .input-panel::-webkit-scrollbar-thumb {
            background: #ccd3db;
            border-radius: 8px;
        }
        .section-title {
            font-size: 14px;
            font-weight: 600;
            color: #4a5462;
            letter-spacing: 0.5px;
            margin-bottom: 2px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .section-title .icon-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--accent);
            flex-shrink: 0;
        }
        .btn-group-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 7px;
        }
        .btn-group-grid.col3 {
            grid-template-columns: repeat(3, 1fr);
        }
        .btn-group-grid.col4 {
            grid-template-columns: repeat(4, 1fr);
        }
        .btn-group-grid.col5 {
            grid-template-columns: repeat(5, 1fr);
        }
        .tag-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 9px 6px;
            font-size: 12.5px;
            font-weight: 500;
            letter-spacing: 0.3px;
            background: var(--tag-bg);
            color: #3a4552;
            border: 1.5px solid #e0e4e9;
            border-radius: 8px;
            cursor: pointer;
            transition: var(--transition);
            user-select: none;
            white-space: nowrap;
            font-family: inherit;
            line-height: 1.3;
        }
        .tag-btn:hover {
            background: #e5eaf0;
            border-color: #c5cdd6;
            transform: translateY(-1px);
        }
        .tag-btn.active {
            background: var(--tag-active);
            color: var(--tag-active-text);
            border-color: var(--tag-active);
            font-weight: 600;
            box-shadow: 0 3px 10px rgba(30, 42, 54, 0.2);
        }
        .tag-btn.mat-active {
            background: var(--mat-active);
            color: var(--mat-active-text);
            border-color: #a07d52;
            font-weight: 600;
            box-shadow: 0 3px 10px rgba(184, 149, 106, 0.25);
        }
        .tag-btn.model-active {
            background: var(--model-active);
            color: var(--model-active-text);
            border-color: #3a6a8a;
            font-weight: 600;
            box-shadow: 0 3px 10px rgba(74, 124, 155, 0.25);
        }
        .tag-btn.form-active {
            background: var(--form-active);
            color: var(--form-active-text);
            border-color: #5d7d54;
            font-weight: 600;
            box-shadow: 0 3px 10px rgba(122, 154, 110, 0.3);
        }
        .input-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .input-row .input-group {
            flex: 1;
            min-width: 100px;
        }
        .input-group label {
            display: block;
            font-size: 12.5px;
            font-weight: 500;
            color: #4a5462;
            margin-bottom: 3px;
            letter-spacing: 0.2px;
        }
        .input-group input,
        .input-group textarea {
            width: 100%;
            padding: 10px 13px;
            font-size: 13.5px;
            background: #f9fafb;
            border: 1px solid #d5dbe2;
            border-radius: 7px;
            font-family: inherit;
            color: #1e2a36;
            transition: var(--transition);
            letter-spacing: 0.2px;
        }
        .input-group input:focus,
        .input-group textarea:focus {
            border-color: var(--accent);
            outline: none;
            box-shadow: 0 0 0 3px rgba(184, 149, 106, 0.08);
            background: #fff;
        }
        .input-group textarea {
            min-height: 60px;
            resize: vertical;
            line-height: 1.5;
        }
        .generate-btn {
            background: var(--btn-bg);
            border: none;
            width: 100%;
            padding: 14px;
            font-size: 16px;
            font-weight: 500;
            color: #fff;
            letter-spacing: 1.2px;
            border-radius: 28px;
            cursor: pointer;
            transition: var(--transition);
            border-bottom: 3px solid var(--accent);
            position: relative;
            overflow: hidden;
            font-family: inherit;
            margin-top: 4px;
        }
        .generate-btn:hover {
            background: var(--btn-hover);
            transform: translateY(-2px);
            box-shadow: 0 10px 24px rgba(0, 0, 0, 0.18);
        }
        .generate-btn:active {
            transform: translateY(0);
            transition: 0.06s;
        }
        .output-panel {
            flex: 2 1 620px;
            background: #fafaf7;
            padding: 22px 22px 16px;
            max-height: 900px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .output-panel::-webkit-scrollbar {
            width: 4px;
        }
        .output-panel::-webkit-scrollbar-thumb {
            background: #ccd3db;
            border-radius: 8px;
        }
        .output-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }
        .output-header h2 {
            font-size: 20px;
            font-weight: 500;
            color: #1e2a36;
            letter-spacing: 0.4px;
        }
        .badge {
            background: #e8ecf1;
            color: #3a4552;
            padding: 5px 14px;
            border-radius: 18px;
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.3px;
            white-space: nowrap;
        }
        .badge.accent {
            background: #f3ede5;
            color: #8b6d4a;
        }
        .badge.model-badge {
            background: #e4edf3;
            color: #3a5d7a;
        }
        .badge.count-badge {
            background: #e8f0e8;
            color: #4a7a4e;
            font-weight: 600;
        }
        .badge.form-badge {
            background: #eaf5e5;
            color: #4a6e3f;
        }
        .prompts-grid {
            display: flex;
            flex-direction: column;
            gap: 9px;
        }
        .prompt-item {
            background: #fff;
            border: 1px solid #eaedf0;
            border-radius: var(--radius-sm);
            padding: 16px 18px 12px;
            transition: var(--transition);
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .prompt-item:hover {
            border-color: #c5cdd6;
            box-shadow: 0 3px 12px rgba(0, 0, 0, 0.035);
        }
        .prompt-top-row {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }
        .prompt-num {
            font-size: 11px;
            font-weight: 600;
            color: #6b7682;
            background: #f1f4f7;
            padding: 3px 8px;
            border-radius: 10px;
            letter-spacing: 0.3px;
            white-space: nowrap;
        }
        .prompt-tag {
            font-size: 10.5px;
            font-weight: 500;
            padding: 2px 7px;
            border-radius: 10px;
            letter-spacing: 0.2px;
            white-space: nowrap;
        }
        .tag-material {
            background: #fdf3e8;
            color: #8b6d4a;
        }
        .tag-color {
            background: #e8f0f7;
            color: #4a6d8c;
        }
        .tag-theme {
            background: #eef5ed;
            color: #4a7a4e;
        }
        .tag-layout {
            background: #f5f0fa;
            color: #6b4d8a;
        }
        .tag-form {
            background: #dff0d8;
            color: #3c6e2f;
        }
        .tag-model-sm {
            background: #eaf0f7;
            color: #3a5d7a;
            font-size: 10px;
            padding: 2px 7px;
        }
        .prompt-text {
            font-size: 13px;
            line-height: 1.7;
            color: #2d3844;
            padding-right: 65px;
            word-break: break-word;
            background: #f9fafb;
            padding: 9px 12px;
            border-radius: 6px;
            white-space: pre-wrap;
            letter-spacing: 0.2px;
        }
        .copy-btn {
            background: #f6f8fa;
            color: #3a4552;
            border: 1px solid #dde1e6;
            border-radius: 18px;
            padding: 5px 12px;
            font-size: 11.5px;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 3px;
            position: absolute;
            bottom: 10px;
            right: 14px;
            white-space: nowrap;
            font-family: inherit;
            letter-spacing: 0.3px;
            z-index: 1;
        }
        .copy-btn:hover {
            background: #b8956a;
            color: #fff;
            border-color: #a07d52;
        }
        .copy-btn.copied {
            background: #4caf50;
            color: #fff;
            border-color: #388e3c;
            pointer-events: none;
        }
        .footer-note {
            font-size: 11.5px;
            color: #8b95a2;
            text-align: right;
            border-top: 1px dashed #dde1e6;
            padding-top: 10px;
            letter-spacing: 0.3px;
            flex-shrink: 0;
        }
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #9aa5b0;
            font-size: 14px;
            letter-spacing: 0.3px;
            background: #fafbfc;
            border-radius: var(--radius-sm);
        }
        @media (max-width: 900px) {
            .input-panel {
                border-right: none;
                border-bottom: 1px solid #eaedf0;
                flex: 1 1 100%;
                max-height: none;
            }
            .output-panel {
                flex: 1 1 100%;
                max-height: 600px;
            }
            .btn-group-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .btn-group-grid.col3 {
                grid-template-columns: repeat(3, 1fr);
            }
            .btn-group-grid.col4 {
                grid-template-columns: repeat(2, 1fr);
            }
            .btn-group-grid.col5 {
                grid-template-columns: repeat(3, 1fr);
            }
            .prompt-text {
                padding-right: 55px;
                font-size: 12px;
            }
            .header h1 {
                font-size: 21px;
            }
            .tag-btn {
                font-size: 11px;
                padding: 7px 4px;
            }
        }
        @media (max-width: 500px) {
            .btn-group-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 5px;
            }
            .btn-group-grid.col3,
            .btn-group-grid.col4,
            .btn-group-grid.col5 {
                grid-template-columns: repeat(2, 1fr);
            }
            .prompt-text {
                padding-right: 0;
                padding-bottom: 35px;
            }
            .input-panel {
                padding: 16px 10px 14px;
            }
            .output-panel {
                padding: 14px 10px 12px;
            }
            .tag-btn {
                font-size: 10.5px;
                padding: 7px 3px;
                letter-spacing: 0;
            }
            .header {
                padding: 16px 14px 14px;
            }
            .header h1 {
                font-size: 18px;
                letter-spacing: 0.4px;
            }
        }
    </style>
</head>
<body>
    <div class="generator-card">
        <div class="header">
            <div>
                <h1>文化墙专业提示词生成器 · 20组方案</h1>
                <span class="subtitle">材质·主题·色彩·表现形式 · 全中文输出 · 每组不重复</span>
            </div>
            <span class="header-badge">🏗️ 即梦AI / MidJourney / Image2 / 香蕉模型</span>
        </div>

        <div class="main">
            <div class="input-panel" id="inputPanel">
                <!-- 行业类型 -->
                <div>
                    <div class="section-title"><span class="icon-dot"></span>行业类型（必选）</div>
                    <div class="btn-group-grid col5" id="industryBtns">
                        <button class="tag-btn active" data-industry="党建文化墙">党建文化墙</button>
                        <button class="tag-btn" data-industry="机关单位文化墙">机关单位文化墙</button>
                        <button class="tag-btn" data-industry="企业介绍文化墙">企业介绍文化墙</button>
                        <button class="tag-btn" data-industry="品牌故事文化墙">品牌故事文化墙</button>
                        <button class="tag-btn" data-industry="发展历程文化墙">发展历程文化墙</button>
                        <button class="tag-btn" data-industry="团队风采文化墙">团队风采文化墙</button>
                        <button class="tag-btn" data-industry="合作伙伴文化墙">合作伙伴文化墙</button>
                        <button class="tag-btn" data-industry="互动版板块文化墙">互动版板块文化墙</button>
                        <button class="tag-btn" data-industry="商业空间文化墙">商业空间文化墙</button>
                        <button class="tag-btn" data-industry="校园文化墙">校园文化墙</button>
                    </div>
                </div>

                <!-- 材质选择 -->
                <div>
                    <div class="section-title"><span class="icon-dot"></span>主材质（单选）</div>
                    <div class="btn-group-grid col4" id="materialBtns">
                        <button class="tag-btn mat-active" data-material="烤漆板">烤漆板</button>
                        <button class="tag-btn" data-material="木饰面">木饰面</button>
                        <button class="tag-btn" data-material="微水泥">微水泥</button>
                        <button class="tag-btn" data-material="金属板">金属板</button>
                        <button class="tag-btn" data-material="亚克力">亚克力</button>
                        <button class="tag-btn" data-material="石材纹理">石材纹理</button>
                        <button class="tag-btn" data-material="艺术涂料">艺术涂料</button>
                        <button class="tag-btn" data-material="波浪板">波浪板</button>
                        <button class="tag-btn" data-material="皮革硬包">皮革硬包</button>
                        <button class="tag-btn" data-material="磨砂玻璃">磨砂玻璃</button>
                        <button class="tag-btn" data-material="木格栅">木格栅</button>
                        <button class="tag-btn" data-material="铝塑板">铝塑板</button>
                    </div>
                </div>

                <!-- 风格倾向 -->
                <div>
                    <div class="section-title"><span class="icon-dot"></span>风格倾向</div>
                    <div class="btn-group-grid col3" id="styleBtns">
                        <button class="tag-btn active" data-style="现代简约">现代简约</button>
                        <button class="tag-btn" data-style="商务大气">商务大气</button>
                        <button class="tag-btn" data-style="轻奢高级">轻奢高级</button>
                        <button class="tag-btn" data-style="新中式">新中式</button>
                        <button class="tag-btn" data-style="科技感">科技感</button>
                        <button class="tag-btn" data-style="庄重红色">庄重红色</button>
                    </div>
                </div>

                <!-- 表现形式（新增） -->
                <div>
                    <div class="section-title"><span class="icon-dot"></span>表现形式（单选）</div>
                    <div class="btn-group-grid col4" id="formStyleBtns">
                        <button class="tag-btn form-active" data-form="立体造型">立体造型</button>
                        <button class="tag-btn" data-form="平面印刷">平面印刷</button>
                        <button class="tag-btn" data-form="自然森系风格">自然森系风格</button>
                        <button class="tag-btn" data-form="可更新材质文化墙">可更新材质文化墙</button>
                        <button class="tag-btn" data-form="实物展示风格">实物展示风格</button>
                        <button class="tag-btn" data-form="生态自然风">生态自然风</button>
                        <button class="tag-btn" data-form="新中式">新中式</button>
                        <button class="tag-btn" data-form="科技感">科技感</button>
                        <button class="tag-btn" data-form="体育竞技风格文化墙">体育竞技风格</button>
                        <button class="tag-btn" data-form="卡通风格">卡通风格</button>
                        <button class="tag-btn" data-form="现代简约">现代简约</button>
                        <button class="tag-btn" data-form="校园风格">校园风格</button>
                        <button class="tag-btn" data-form="廉政党建">廉政党建</button>
                        <button class="tag-btn" data-form="乡村文化墙">乡村文化墙</button>
                        <button class="tag-btn" data-form="社区文化墙">社区文化墙</button>
                        <button class="tag-btn" data-form="医院文化墙">医院文化墙</button>
                    </div>
                </div>

                <!-- 生图模型选择 -->
                <div>
                    <div class="section-title"><span class="icon-dot"></span>生图模型（全中文输出）</div>
                    <div class="btn-group-grid col4" id="modelBtns">
                        <button class="tag-btn model-active" data-model="jimeng">即梦AI</button>
                        <button class="tag-btn" data-model="midjourney">MidJourney</button>
                        <button class="tag-btn" data-model="image2">Image2</button>
                        <button class="tag-btn" data-model="banana">香蕉模型</button>
                    </div>
                </div>

                <!-- 文字内容 -->
                <div>
                    <div class="section-title"><span class="icon-dot"></span>文字内容</div>
                    <div class="input-row">
                        <div class="input-group">
                            <label>主标题 / 使命</label>
                            <input type="text" id="mission" value="不忘初心·牢记使命" placeholder="输入主标题或使命语句">
                        </div>
                        <div class="input-group">
                            <label>副标题 / 愿景</label>
                            <input type="text" id="vision" value="建设一流团队·服务高质量发展" placeholder="输入副标题或愿景语句">
                        </div>
                    </div>
                    <div class="input-row" style="margin-top:8px;">
                        <div class="input-group">
                            <label>补充内容 / 价值观</label>
                            <input type="text" id="values" value="忠诚·担当·创新·奉献" placeholder="输入价值观或补充内容">
                        </div>
                        <div class="input-group">
                            <label>空间位置</label>
                            <input type="text" id="spaceType" value="单位大厅主墙面" placeholder="例：单位大厅主墙面 / 走廊">
                        </div>
                    </div>
                </div>

                <button class="generate-btn" id="generateBtn">⚡ 生成 20 组专业提示词（每组不重复）</button>
            </div>

            <div class="output-panel" id="outputPanel">
                <div class="output-header">
                    <h2>📐 20组正立面专业提示词（全中文）</h2>
                    <span class="badge accent" id="industryBadge">党建文化墙</span>
                    <span class="badge form-badge" id="formBadge">立体造型</span>
                    <span class="badge model-badge" id="modelBadge">即梦AI</span>
                    <span class="badge count-badge" id="countDisplay">0 / 20</span>
                </div>
                <div class="prompts-grid" id="promptsList">

            // 生成20组提示词
            function generatePrompts() {
                const spaceType = spaceTypeInput.value.trim() || '单位大厅主墙面';
                const mission = missionInput.value.trim() || '不忘初心·牢记使命';
                const vision = visionInput.value.trim() || '建设一流团队·服务高质量发展';
                const values = valuesInput.value.trim() || '忠诚·担当·创新·奉献';
                const colors = getIndustryColors(selectedIndustry);
                const themes = getIndustryThemeKeywords(selectedIndustry);
                const variants = getDesignVariants();
                const formDesc = getFormStyleDescription(selectedFormStyle);
                const prompts = [];

                for (let i = 0; i < 20; i++) {
                    const dv = variants[i];
                    const mainColor = colors[dv.colorShift % colors.length];
                    const secColor = colors[(dv.colorShift + 3) % colors.length];
                    const accentColor = colors[(dv.colorShift + 6) % colors.length];
                    const themeKW = themes[dv.themeShift % themes.length];
                    const themeKW2 = themes[(dv.themeShift + 4) % themes.length];
                    const themeKW3 = themes[(dv.themeShift + 7) % themes.length];

                    let modelPrefix = '';
                    if (selectedModel === 'midjourney') {
                        modelPrefix = '建筑室内效果图：';
                    } else if (selectedModel === 'image2') {
                        modelPrefix = '高清室内设计渲染图：';
                    } else if (selectedModel === 'banana') {
                        modelPrefix = '8K超清文化墙效果图：';
                    }

                    const prompt =
                        `${modelPrefix}${selectedIndustry}文化墙设计方案，安装于${spaceType}，采用${dv.layout}。` +
                        `主体材质选用${selectedMaterial}，${dv.materialDesc}，` +
                        `主色调为${mainColor}，辅以${secColor}点缀，细节处运用${accentColor}提亮。` +
                        `设计主题融合"${themeKW}"、"${themeKW2}"与"${themeKW3}"三大概念。` +
                        `主标题"${mission}"以醒目大字${dv.focus}，` +
                        `副标题"${vision}"以适中字号配合排列于对应区域，` +
                        `补充内容"${values}"错落分布点缀其间。` +
                        `表现形式：${formDesc}。` +
                        `灯光方案为${dv.lighting}。` +
                        `整体风格定位${selectedStyle}，文字排版舒适层次分明，` +
                        `所有工艺均可施工落地，文化墙正立面完全展示，平视视角。`;

                    prompts.push({
                        prompt: prompt,
                        material: selectedMaterial,
                        color: mainColor,
                        theme: themeKW,
                        layout: dv.layout.replace('布局', ''),
                        form: selectedFormStyle,
                        model: selectedModel
                    });
                }
                return prompts;
            }

            function renderPrompts(promptObjs) {
                if (!promptObjs || promptObjs.length === 0) {
                    promptsListDiv.innerHTML =
                        `<div class="empty-state"><div>⚠️ 生成失败</div><div style="margin-top:6px;">请检查选择后重试</div></div>`;
                    countDisplay.innerText = '0 / 20';
                    return;
                }
                let html = '';
                promptObjs.forEach((item, idx) => {
                    const escaped = item.prompt.replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g,
                        '&gt;');
                    html += `
                    <div class="prompt-item">
                        <div class="prompt-top-row">
                            <span class="prompt-num">第 ${idx+1} 组</span>
                            <span class="prompt-tag tag-material">🪵 ${item.material}</span>
                            <span class="prompt-tag tag-color">🎨 ${item.color}</span>
                            <span class="prompt-tag tag-theme">📌 ${item.theme}</span>
                            <span class="prompt-tag tag-layout">📐 ${item.layout}</span>
                            <span class="prompt-tag tag-form">✨ ${item.form}</span>
                        </div>
                        <div class="prompt-text">${item.prompt}</div>
                        <button class="copy-btn" data-prompt="${escaped}">📋 复制</button>
                    </div>`;
                });
                promptsListDiv.innerHTML = html;
                countDisplay.innerText = `${promptObjs.length} / 20`;
                industryBadge.textContent = selectedIndustry;
                formBadge.textContent = selectedFormStyle;
                setupCopyButtons();
                outputPanel.scrollTo({ top: 0, behavior: 'smooth' });
            }

            function setLoading() {
                promptsListDiv.innerHTML =
                    `<div class="empty-state"><div>⏳ 正在生成20组不重复提示词...</div><div style="margin-top:6px;">行业：${selectedIndustry} | 材质：${selectedMaterial} | 风格：${selectedStyle} | 表现形式：${selectedFormStyle}</div></div>`;
                countDisplay.innerText = '0 / 20';
            }

            function setupCopyButtons() {
                document.querySelectorAll('.copy-btn').forEach(btn => {
                    const clone = btn.cloneNode(true);
                    btn.parentNode.replaceChild(clone, btn);
                    clone.addEventListener('click', function(e) {
                        e.preventDefault();
                        const txt = this.getAttribute('data-prompt');
                        if (!txt) return;
                        navigator.clipboard.writeText(txt).then(() => {
                            const orig = this.innerHTML;
                            this.innerHTML = '✓ 已复制';
                            this.classList.add('copied');
                            setTimeout(() => { this.innerHTML = orig;
                                this.classList.remove('copied'); }, 1800);
                        }).catch(() => {
                            const ta = document.createElement('textarea');
                            ta.value = txt;
                            ta.style.cssText = 'position:fixed;opacity:0;';
                            document.body.appendChild(ta);
                            ta.select();
                            try { document.execCommand('copy'); } catch (er) {}
                            document.body.removeChild(ta);
                            const orig = this.innerHTML;
                            this.innerHTML = '✓ 已复制';
                            this.classList.add('copied');
                            setTimeout(() => { this.innerHTML = orig;
                                this.classList.remove('copied'); }, 1800);
                        });
                    });
                });
            }

            function handleGenerate() {
                setLoading();
                setTimeout(() => {
                    try {
                        const prompts = generatePrompts();
                        renderPrompts(prompts);
                    } catch (e) {
                        promptsListDiv.innerHTML = `<div class="empty-state"><div>❌ 生成出错</div></div>`;
                        countDisplay.innerText = '0 / 20';
                        console.error(e);
                    }
                }, 100);
            }

            generateBtn.addEventListener('click', handleGenerate);
            window.addEventListener('DOMContentLoaded', () => {
                setTimeout(() => handleGenerate(), 220);
            });
            document.querySelectorAll('.input-group input').forEach(inp => {
                inp.addEventListener('keydown', function(e) {
                    if (e.ctrlKey && e.key === 'Enter') {
                        e.preventDefault();
                        handleGenerate();
                    }
                });
            });
        })();
    </script>
</body>
</html>
